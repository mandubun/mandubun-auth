<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Learn Korean by reading Naver Webtoons">
  <title>Mandubun</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <!-- Top nav bar -->
  <header id="app-header">
    <div class="header-inner">

      <div id="header-auth"></div>
    </div>
  </header>

  <!-- Main content area -->
  <main id="app-root"></main>

  <!-- Bottom navigation (mobile) -->
  <nav id="bottom-nav">
    <a href="#/" class="nav-item" data-page="home">
      <span class="nav-icon">&#127968;</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="#/catalog" class="nav-item" data-page="catalog">
      <span class="nav-icon">&#128218;</span>
      <span class="nav-label">Browse</span>
    </a>
    <a href="#/learn" class="nav-item" data-page="learn">
      <span class="nav-icon">&#128218;</span>
      <span class="nav-label">Learn</span>
    </a>
    <a href="#/settings" class="nav-item" data-page="settings">
      <span class="nav-icon">&#9881;</span>
      <span class="nav-label">Settings</span>
    </a>
  </nav>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Offline banner -->
  <div id="offline-banner" class="hidden">You're offline. Some features may be limited.</div>

  <script src="dist/app.js"></script>
</body>
</html>
